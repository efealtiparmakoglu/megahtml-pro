<!-- 
  MegaHTML Pro - Button Component
  Usage: <button class="btn btn-primary">Click me</button>
-->

<!-- Button Variants -->
<div class="component-showcase">
  <!-- Primary Button -->
  <button class="btn btn-primary">
    Primary Button
    <svg class="btn-icon" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
  
  <!-- Secondary Button -->
  <button class="btn btn-secondary">Secondary</button>
  
  <!-- Outline Button -->
  <button class="btn btn-outline">Outline</button>
  
  <!-- Ghost Button -->
  <button class="btn btn-ghost">Ghost</button>
  
  <!-- Large Button -->
  <button class="btn btn-primary btn-lg">Large Button</button>
  
  <!-- Small Button -->
  <button class="btn btn-primary btn-sm">Small</button>
  
  <!-- Loading Button -->
  <button class="btn btn-primary loading" disabled>
    <span class="spinner"></span>
    Loading...
  </button>
  
  <!-- Icon Button -->
  <button class="btn btn-icon" aria-label="Settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 17.66l-4.24 4.24M23 12h-6m-6 0H1m20.07 4.93l-4.24-4.24M6.34 6.34L2.1 2.1"/></svg>
  </button>
</div>
