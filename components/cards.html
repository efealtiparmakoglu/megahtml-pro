<!-- 
  MegaHTML Pro - Card Component
  Usage: Copy and modify for various card layouts
-->

<div class="cards-grid">
  <!-- Basic Card -->
  <article class="card">
    <div class="card-image">
      <img src="assets/card-image.jpg" alt="Card Image" loading="lazy">
    </div>
    <div class="card-content">
      <span class="card-tag">Category</span>
      <h3 class="card-title">Card Title</h3>
      <p class="card-description">Card description goes here. Add your content.</p>
      <a href="#" class="card-link">Learn More →</a>
    </div>
  </article>
  
  <!-- Feature Card -->
  <article class="card card-feature">
    <div class="card-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </div>
    <h3>Feature Title</h3>
    <p>Feature description with more details.</p>
  </article>
  
  <!-- Pricing Card -->
  <article class="card card-pricing">
    <div class="pricing-header">
      <h3>Pro Plan</h3>
      <div class="pricing-price">
        <span class="currency">$</span>
        <span class="amount">29</span>
        <span class="period">/month</span>
      </div>
    </div>
    
    <ul class="pricing-features">
      <li>✓ Feature One</li>
      <li>✓ Feature Two</li>
      <li>✓ Feature Three</li>
    </ul>
    
    <button class="btn btn-primary btn-block">Get Started</button>
  </article>
  
  <!-- Testimonial Card -->
  <article class="card card-testimonial">
    <div class="testimonial-content">
      <blockquote>
        "This is an amazing testimonial from a satisfied customer."
      </blockquote>
    </div>
    
    <div class="testimonial-author">
      <img src="assets/avatar.jpg" alt="Author" class="author-avatar">
      <div class="author-info">
        <strong>John Doe</strong>
        <span>CEO, Company</span>
      </div>
    </div>
  </article>
</div>
